<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Store | Official</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --blue: #00d2ff; --dark: #020b16; --card: #05162a; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* BANNER PETIR */
        .banner {
            height: 200px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJmZzRyeGZ6ZzRyeGZ6ZzRyeGZ6ZzRyeGZ6ZzRyeGZ6ZzRyeGZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKVUn7iM8FMEU24/giphy.gif');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom: 2px solid var(--blue); box-shadow: 0 0 20px var(--blue);
        }

        .container { padding: 20px; max-width: 500px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }

        /* CARD PRODUK */
        .p-card { background: var(--card); border: 1px solid #103a63; border-radius: 12px; padding: 15px; position: relative; }
        .p-price { color: var(--blue); font-size: 20px; font-weight: bold; }
        .p-title { font-size: 16px; margin: 5px 0; font-weight: bold; letter-spacing: 1px; }
        .p-desc { font-size: 12px; color: #888; margin-bottom: 15px; }
        
        .btn-buy { background: var(--blue); color: #000; border: none; padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; text-align: center; box-sizing: border-box; }

        /* ADMIN PANEL (HIDDEN) */
        #admin-panel { background: #000; border: 2px solid red; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: none; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        
        .admin-trigger { position: fixed; bottom: 10px; right: 10px; width: 30px; height: 30px; opacity: 0.2; }
    </style>
</head>
<body>

    <div class="banner">
        <h1 style="letter-spacing: 10px; margin: 0; color: var(--blue);">FAST STORE</h1>
        <p style="font-size: 10px; color: #ccc;">LIGHTNING SPEED TRANSACTION</p>
    </div>

    <div class="container">
        <div id="admin-panel">
            <h3 style="color: red; margin-top: 0;">OWNER DASHBOARD</h3>
            <input type="text" id="adm-title" placeholder="Nama Produk">
            <input type="text" id="adm-price" placeholder="Harga (Contoh: Rp 50.000)">
            <textarea id="adm-desc" placeholder="Deskripsi Produk"></textarea>
            <button class="btn-buy" style="background: red; color: white;" onclick="uploadProduct()">UPLOAD PRODUK</button>
            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
            <input type="text" id="link-tele" placeholder="Username Telegram (Tanpa @)">
            <input type="text" id="link-tt" placeholder="Username TikTok (Tanpa @)">
            <button class="btn-buy" onclick="saveLinks()">UPDATE SOSMED</button>
            <button onclick="document.getElementById('admin-panel').style.display='none'" style="background:none; color:gray; border:none; width:100%; margin-top:10px;">Close Panel</button>
        </div>

        <div id="product-grid" class="grid">
            </div>

        <div id="contact-info" style="text-align: center; margin-top: 30px; font-size: 11px; color: #444;">
            ORDER VIA: <span id="view-tele">@VortexShopss</span> | <span id="view-tt">@vin_dipanggil_nengok</span>
        </div>
    </div>

    <div class="admin-trigger" onclick="adminClick()"></div>

<script>
    const config = { 
        apiKey: "AIzaSyAqdcpcUxfUBNY2H83IBa1Pp0X6YcQtDlQ", 
        databaseURL: "https://theeyes-8d0aa-default-rtdb.asia-southeast1.firebasedatabase.app" 
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    let count = 0;
    function adminClick() {
        count++;
        if(count >= 5) {
            const pass = prompt("MASUKKAN ACCESS KEY OWNER:");
            if(pass === "111") {
                document.getElementById('admin-panel').style.display = 'block';
                window.scrollTo(0,0);
            }
            count = 0;
        }
    }

    // --- FUNGSI OWNER ---
    function uploadProduct() {
        const title = document.getElementById('adm-title').value;
        const price = document.getElementById('adm-price').value;
        const desc = document.getElementById('adm-desc').value;
        if(title && price) {
            db.ref('fast_store/products').push({ title, price, desc });
            alert("Produk Berhasil Diupload!");
            document.getElementById('adm-title').value = "";
            document.getElementById('adm-price').value = "";
            document.getElementById('adm-desc').value = "";
        }
    }

    function saveLinks() {
        const tele = document.getElementById('link-tele').value;
        const tt = document.getElementById('link-tt').value;
        db.ref('fast_store/links').set({ tele, tt });
        alert("Link Sosmed Diperbarui!");
    }

    // --- FUNGSI VIEW (PEMBELI) ---
    function loadStore() {
        // Load Sosmed
        db.ref('fast_store/links').on('value', (s) => {
            const d = s.val();
            if(d) {
                document.getElementById('view-tele').innerText = "@" + d.tele;
                document.getElementById('view-tt').innerText = "@" + d.tt;
                window.currentTele = d.tele;
            }
        });

        // Load Produk
        db.ref('fast_store/products').on('value', (s) => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            s.forEach((child) => {
                const p = child.val();
                grid.innerHTML += `
                    <div class="p-card">
                        <div class="p-price">${p.price}</div>
                        <div class="p-title">${p.title}</div>
                        <div class="p-desc">${p.desc}</div>
                        <a href="https://t.me/${window.currentTele || 'VortexShopss'}" class="btn-buy">HUBUNGI ADMIN</a>
                        ${document.getElementById('admin-panel').style.display === 'block' ? 
                          `<button onclick="deleteProduct('${child.key}')" style="background:none; color:red; border:none; font-size:10px; margin-top:10px; cursor:pointer;">Hapus Produk X</button>` : ''}
                    </div>
                `;
            });
        });
    }

    function deleteProduct(id) {
        if(confirm("Hapus produk ini?")) db.ref('fast_store/products/' + id).remove();
    }

    loadStore();
</script>
</body>
</html>
